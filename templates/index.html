<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Data</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; }
        .form-group { margin-bottom: 15px; }
        #error-message { color: red; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <h2>User Registration Form (Flask)</h2>
    
    <form id="dataForm">
        <div class="form-group">
            <label for="username">Username:</label><br>
            <input type="text" id="username" name="username" required>
        </div>
        <div class="form-group">
            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" required>
        </div>
        <button type="submit">Submit</button>
    </form>

    <!-- Error container -->
    <div id="error-message"></div>

    <script>
        document.getElementById('dataForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const errorMessageDiv = document.getElementById('error-message');
            errorMessageDiv.textContent = ''; 

            const formData = {
                username: document.getElementById('username').value,
                email: document.getElementById('email').value
            };

            try {
                const response = await fetch('/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                const result = await response.json();

                if (response.ok) {
                    // Redirect on success
                    window.location.href = result.redirect;
                } else {
                    // Display error on the same page without refreshing
                    errorMessageDiv.textContent = result.message || 'An error occurred.';
                }
            } catch (err) {
                errorMessageDiv.textContent = 'Failed to connect to the Flask server.';
            }
        });
    </script>
</body>
</html>
